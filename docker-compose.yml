services:
  procurewise:
    build: .
    ports:
      - "8501:8501"
    environment:
      PROCUREWISE_USE_LLM: ${PROCUREWISE_USE_LLM:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      PROCUREWISE_CASE_DIR: ${PROCUREWISE_CASE_DIR:-data/runtime}
      HOST: 0.0.0.0
      PORT: "8501"
    volumes:
      - ./data/runtime:/app/data/runtime
